name: jhentai
description: A flutter app for E-Hentai/EXHentai

publish_to: 'none'
version: 8.0.22+335

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  # rewrite file mode
  dio:
    git:
      url: https://github.com/jiangtian616/dio
      path: dio
      ref: append-mode
  get: 4.7.3
  get_storage: 2.1.1
  extended_nested_scroll_view: 6.2.1
  html: 0.15.6
  logger: 2.2.0
  flutter_rating_bar: 4.0.1
  waterfall_flow: 3.1.1
  extended_image: 10.0.1
  font_awesome_flutter: ^11.0.0
  intl: 0.20.2
  collection: 1.19.1
  clipboard: 0.1.3
  pasteboard: 0.5.0
  scrollable_positioned_list: 
    git:
      url: https://github.com/jiangtian616/flutter.widgets
      path: packages/scrollable_positioned_list
  flutter_list_view: 1.1.29
  executor: 2.2.5
  retry: 3.1.2
  path: 1.9.1
  drift: 2.34.0
  sqlite3_flutter_libs: ^0.5.42
  path_provider: 2.1.6
  # https://github.com/letsar/flutter_slidable/issues/488
  flutter_slidable:
    git:
      url: https://github.com/letsar/flutter_slidable.git
      ref: master
  flutter_widget_from_html: 0.17.2
  url_launcher: 6.3.2
  # add onLongPress
  like_button:
    git: https://github.com/jiangtian616/like_button
  webview_flutter: 4.14.0
  desktop_webview_window:
    git:
      url: https://github.com/MixinNetwork/flutter-plugins
      path: packages/desktop_webview_window
      ref: d0c91d9c3ea12883d38215adc48586753fb41dde
  # rewrite double tap & tap drag gesture
  photo_view:
    git:
      url: https://github.com/jiangtian616/photo_view
      ref: separate
  zoom_view: 
    git: https://github.com/jiangtian616/zoom_view
  package_info_plus: 9.0.1
  file_picker: ^8.1.3
  # pinned exactly: local_gallery_service imports pdfx/src (renderer only, viewer clashes with photo_view fork)
  pdfx: 2.9.2
  local_auth: 3.0.1
  blur: 4.0.2
  flutter_windowmanager_plus: 1.0.1
  animate_do: ^5.1.0
  share_plus: 12.0.2
  syncfusion_flutter_charts: 33.2.15
  archive: ^3.6.1
  # https://github.com/ponnamkarthik/FlutterToast/pull/542
  fluttertoast: 
    git: 
      url: https://github.com/MarlonJD/FlutterToast
      ref: patch-1
  battery_plus: 7.1.0
  throttling: 2.0.1
  receive_sharing_intent:
    git:
      url: https://github.com/KasemJaffer/receive_sharing_intent
      # newer commits require compileSdk 37 (Android 17 preview)
      ref: 2cea396843cd3ab1b5ec4334be4233864637874e
  window_manager: 0.5.2
  permission_handler: 12.0.3
  grouped_list: 6.0.0
  flutter_resizable_container: 2.0.0
  loading_animation_widget: 1.3.0
  simple_animations: 5.3.0
  animated_flip_counter: 0.3.4
  saver_gallery: ^3.0.5
  system_network_proxy: 
    git: 
      url: https://github.com/jiangtian616/system_network_proxy
      path: system_network_proxy
  http_proxy: 
    git: https://github.com/jiangtian616/http_proxy
  flutter_socks_proxy:
    # https://github.com/tayoji-io/socks_proxy/issues/7
    git: https://github.com/jiangtian616/socks_proxy
  flutter_draggable_gridview:
    # remove assert
    git:
      url: https://github.com/jiangtian616/flutter_draggable_gridview
  flutter_displaymode: 0.7.0
  pinput: 6.0.2
  wakelock_plus: 1.5.2
  flex_color_picker: 3.8.0
  zoom_widget: 2.0.1
  android_intent_plus: 6.0.0
  integral_isolates: 0.5.1
  screen_brightness: 2.1.11
  crypto: 3.0.7
  csv: ^6.0.0
  dotted_border: ^2.1.0
  j_downloader:
    git: https://github.com/jiangtian616/JDownloader
  device_info_plus: 11.1.0
  template_expressions: 3.3.1+2
  uuid: 4.5.3
  xml: 6.5.0
  telegram: 1.0.0
  volume_key_board: 0.0.2
  webdav_client: ^1.2.2
  minio: ^3.5.8

dependency_overrides:
  # Flutter 3.44 tool no longer tolerates the legacy `pluginClass: none` declaration
  system_network_proxy_macos:
    path: third_party/system_network_proxy_macos
  system_network_proxy_linux:
    path: third_party/system_network_proxy_linux
  system_network_proxy_windows:
    path: third_party/system_network_proxy_windows
  # j_downloader pins uuid 4.4.0 exactly; pdfx needs ^4.5.1
  uuid: ^4.5.1
  # pdfx depends on hosted photo_view; force the project's git fork
  photo_view:
    git:
      url: https://github.com/jiangtian616/photo_view
      ref: separate
  chewie: 1.13.1
  http: 1.6.0
  cached_network_image: 3.4.0
  dio:
    git:
      url: https://github.com/jiangtian616/dio
      path: dio
      ref: append-mode
    
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  test: 1.31.0
  drift_dev: 2.34.0
  build_runner: 2.15.0
  frontend_server_client: 4.0.0
  flutter_launcher_icons: 0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/nhentai/tags.json
